<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>RL 5.1 Converter</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-upload">

    <div class="navbar-custom">
        <div class="nav-left">
            <img src="/static/logo-rsa.png" class="logo-full">
        </div>
    
        <div class="nav-right">
            ☰
        </div>
    </div>
    
<div class="wrapper">

    <div class="content">

        <!-- TITLE -->
        <div class="text-center mb-4">
            <h1 class="main-title">RL 5.1 Converter</h1>
            <p class="subtitle">Konversi laporan rawat jalan ke format SIRS</p>
        </div>

        <!-- CARD -->
        <div class="card">

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="alert">
                {% for msg in messages %}
                <p class="mb-0">{{ msg }}</p>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <input type="file" name="file" class="form-control" accept=".xls,.xlsx" required>
                </div>

                <button class="btn btn-custom w-100">Process</button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
